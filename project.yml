name: TravelApp
options:
  bundleIdPrefix: com.robbieho
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    # Phase 1: skip signing entirely so simulator/macOS builds pass with no Apple team configured.
    # Phase 3 (Sign in with Apple) re-enables automatic signing.
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      baseConfiguration: Config.xcconfig
    Release:
      baseConfiguration: Config.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.5.1"

targets:
  TravelApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: TravelApp/Sources
      - path: TravelApp/Resources
        buildPhase: resources
        excludes:
          - "Info.plist"
          - ".gitkeep"
    info:
      path: TravelApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: Travel
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robbieho.travelapp
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
